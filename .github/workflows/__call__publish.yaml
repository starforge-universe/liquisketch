# Reusable workflow: download sdist/wheel from a prior build job, then publish via Makefile.

name: 'Submodule - Publish'

on:
  workflow_call:
    inputs:
      pypi-repository:
        description: 'Twine --repository-url (upload API, e.g. https://upload.pypi.org/legacy/)'
        required: false
        type: string
        default: 'https://upload.pypi.org/legacy/'
    secrets:
      pypi-username:
        required: true
      pypi-password:
        required: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  publish:
    name: 'Publish to PyPI'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout project sources'
        uses: actions/checkout@v6

      - name: 'Download build artifacts'
        uses: actions/download-artifact@v8
        with:
          name: python-package
          path: dist/

      - name: 'Setup Python ${{ env.PYTHON_VERSION }}'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # Twine comes from [dev]; Makefile targets use .venv/bin/twine.
      - name: 'Install dependencies (make install-dev)'
        run: make install-dev

      - name: 'Validate distributions (make check-dist)'
        run: make check-dist

      - name: 'Publish to PyPI (make upload-pypi)'
        env:
          TWINE_USERNAME: ${{ secrets.pypi-username }}
          TWINE_PASSWORD: ${{ secrets.pypi-password }}
          TWINE_REPOSITORY_URL: ${{ inputs.pypi-repository }}
          TWINE_NON_INTERACTIVE: '1'
        run: make upload-pypi
